lookup_values:
  medium:
    entity_type: show
    values:
      - value: musical
        display_label: Musical
        description: A theatrical work with integrated songs and music
        css_class: badge-warm
      - value: play
        display_label: Play
        description: A theatrical work without integrated musical score
        css_class: badge-sage
      - value: screenplay
        display_label: Screenplay
        description: A script written for film
        css_class: badge-blue
      - value: teleplay
        display_label: Teleplay
        description: A script written for television
        css_class: badge-lavender
      - value: feature_film
        display_label: Feature Film
        description: A full-length film project
        css_class: badge-blue
      - value: short_film
        display_label: Short Film
        description: A short-form film project
        css_class: badge-teal
      - value: limited_series
        display_label: Limited Series
        description: A self-contained television series with a predetermined number of episodes
        css_class: badge-lavender

  development_stage:
    entity_type: show
    values:
      - value: early_development
        display_label: Early Development
        description: Initial concept and early writing phase
        css_class: badge-neutral
      - value: internal_read
        display_label: Internal Read
        description: Internal team read-through
        css_class: badge-neutral
      - value: workshop
        display_label: Workshop
        description: Active workshop and development process
        css_class: badge-warm
      - value: staged_reading
        display_label: Staged Reading
        description: Formal staged reading with actors
        css_class: badge-warm
      - value: table_read
        display_label: Table Read
        description: Seated read-through with actors and creative team
        css_class: badge-warm
      - value: seeking_production
        display_label: Seeking Production
        description: Ready for production, seeking producing partners
        css_class: badge-sage
      - value: in_pre_production
        display_label: In Pre-Production
        description: Pre-production planning underway
        css_class: badge-blue
      - value: in_production
        display_label: In Production
        description: Currently in active production
        css_class: badge-blue
      - value: running
        display_label: Running
        description: Currently running (theatre)
        css_class: badge-sage
      - value: in_post_production
        display_label: In Post-Production
        description: Post-production phase (film/TV)
        css_class: badge-blue
      - value: released
        display_label: Released
        description: Released or premiered
        css_class: badge-sage
      - value: closed
        display_label: Closed
        description: Production has closed
        css_class: badge-neutral

  rights_status:
    entity_type: show
    values:
      - value: original
        display_label: Original
        description: An original work created by WN
        css_class: badge-warm
      - value: optioned
        display_label: Optioned
        description: Rights optioned from another party
        css_class: badge-blue
      - value: public_domain_adaptation
        display_label: Public Domain Adaptation
        description: Adapted from public domain source material
        css_class: badge-sage

  track_type:
    entity_type: music_file
    values:
      - value: demo_recording
        display_label: Demo Recording
        description: Demo recording of a song or musical number
      - value: rehearsal_track
        display_label: Rehearsal Track
        description: Track for rehearsal use
      - value: piano_vocal_score
        display_label: Piano/Vocal Score
        description: Piano and vocal arrangement
      - value: orchestration
        display_label: Orchestration
        description: Full orchestral arrangement
      - value: score
        display_label: Score
        description: Film/TV score track
      - value: temp_track
        display_label: Temp Track
        description: Temporary track for reference
      - value: other
        display_label: Other
        description: Other music file type

  data_type:
